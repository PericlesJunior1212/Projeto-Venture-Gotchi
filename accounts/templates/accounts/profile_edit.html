    {% extends "base.html" %}
    {% block content %}
    <div class="container py-4">

    <h3 class="mb-3">Editar Perfil</h3>

    <div class="card shadow-sm">
        <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
            <label class="form-label">Bio</label>
            {{ form.bio }}
            </div>

            <div class="mb-3">
            <label class="form-label">Interesses</label>
            {{ form.interests }}
            </div>

            <div class="mb-3">
            <label class="form-label">Avatar</label>
            {{ form.avatar }}
            <div class="form-text">Envie uma imagem (png/jpg). Opcional.</div>
            </div>

            <button class="btn btn-success">Salvar</button>
            <a href="{% url 'profile' %}" class="btn btn-secondary">Cancelar</a>
        </form>
        </div>
    </div>

    </div>
    {% endblock %}
