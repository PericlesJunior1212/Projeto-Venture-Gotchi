{% extends "base.html" %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="alert alert-success shadow-sm">
        <h4 class="mb-2">Se existir uma conta, enviamos o link ✅</h4>
        <p class="mb-0">
          Verifique seu e-mail (e a caixa de spam). No ambiente local, o “e-mail” aparece no terminal.
        </p>
      </div>

      <div class="text-center mt-3">
        <a class="btn btn-outline-primary" href="{% url 'login' %}">Voltar para o login</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
