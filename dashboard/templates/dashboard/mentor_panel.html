{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h3>Painel do Mentor</h3>
  <p class="text-muted">Avaliar progresso (lista simples de usuários).</p>

  <ul class="list-group">
    {% for u in users %}
      <li class="list-group-item d-flex justify-content-between">
        <span>{{ u.username }}</span>
        <span>Nível: {{ u.level }} | XP: {{ u.xp }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
