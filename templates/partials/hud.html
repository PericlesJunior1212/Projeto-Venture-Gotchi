{% load static %}
<div class="vg-card border-0 mb-3" style="background: rgba(11,16,32,.95); color:#fff;">
  <div class="card-body d-flex align-items-center justify-content-between gap-3">
    <div class="d-flex align-items-center gap-3">
      <div class="rounded-circle border border-2 overflow-hidden" style="width:56px;height:56px;">
        <img
          src="{% static gotchi_image %}"
          alt="Gotchi"
          style="width:56px;height:56px;object-fit:cover; image-rendering: pixelated;"
        >
      </div>

      <div>
        <div class="pixel-font" style="font-size:12px;">LV {{ level }}</div>
        <div class="text-white-50" style="font-size:13px;">{{ user.username }}</div>
      </div>
    </div>

    <div style="min-width: 260px;">
      <div class="d-flex justify-content-between text-white-50" style="font-size:12px;">
        <span>XP</span>
        <span class="pixel-font" style="font-size:11px;">{{ xp }} / {{ xp_next }}</span>
      </div>

      <div class="progress mt-2" style="height:14px; background: rgba(255,255,255,.12);">
        <div class="progress-bar vg-xp xp-anim"
             role="progressbar"
             style="width: {{ progress_percent }}%;"
             aria-valuenow="{{ progress_percent }}" aria-valuemin="0" aria-valuemax="100">
        </div>
      </div>
    </div>
  </div>
</div>
