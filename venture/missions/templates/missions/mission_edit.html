{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Missão{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="fw-bold mb-4">Editar Missão</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="title" class="form-control" value="{{ mission.title }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="description" class="form-control">{{ mission.description }}</textarea>
        </div>

        <button type="submit" class="btn btn-warning">Salvar Alterações</button>
        <a href="{% url 'mission_detail' mission.id %}" class="btn btn-secondary">Voltar</a>
    </form>

</div>
{% endblock %}
