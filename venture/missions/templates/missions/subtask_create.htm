{% extends 'base.html' %}
{% load static %}

{% block title %}Criar Tarefa{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="fw-bold mb-4">Adicionar Nova Tarefa</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Título da Tarefa</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">XP da Tarefa</label>
            <input type="number" name="xp_reward" class="form-control" value="10" min="1" required>
        </div>

        <button type="submit" class="btn btn-primary">Adicionar</button>
        <a href="{% url 'mission_detail' mission.id %}" class="btn btn-secondary">Cancelar</a>
    </form>

</div>
{% endblock %}
