{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 900px;">
  <h2 class="mb-3">Comunidade</h2>

  {% if rooms %}
    <div class="row g-3">
      {% for r in rooms %}
        <div class="col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h5 class="mb-1">{{ r.title }}</h5>
              <p class="text-muted small mb-2">{{ r.description }}</p>
              <a class="btn btn-primary btn-sm" href="{% url 'community_room_detail' r.slug %}">
                Entrar
              </a>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-muted">Nenhuma sala criada ainda. Crie no Admin.</p>
  {% endif %}
</div>
{% endblock %}
